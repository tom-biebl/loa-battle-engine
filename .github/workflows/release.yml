name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --legacy-peer-deps

      - run: npm run build

      - name: Update module version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg version "$VERSION" '.version = $version' module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Build release zip
        run: |
          zip -r module.zip \
            module.json \
            dist/loa-battle-engine.js \
            dist/loa-battle-engine.css \
            templates/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            module.json
